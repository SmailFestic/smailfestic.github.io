<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smail Festić - Video</title>
    <style>
        /* Omogočimo standarden drsnik na vseh straneh za preprečitev skakanja menija */
        html {
            overflow-y: scroll;
        }

        body {
            font-family: 'Georgia', serif;
            line-height: 1.8;
            margin: 0;
            padding: 0;
            color: #333;
            min-height: 100vh;
            background-color: #fbfbfb;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Zgornji pas z zameglitvijo */
        .header-band {
            width: 100%;
            background-color: rgba(251, 251, 251, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 10;
        }

        /* Meni */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            width: 90%;
            margin: 0 auto;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.2em;
            text-decoration: none;
            color: #111;
        }

        .navbar-links a {
            text-decoration: none;
            color: #555;
            margin-left: 20px;
            font-size: 0.95em;
        }

        .navbar-links a:hover {
            color: #000;
        }

        /* Osrednji del strani */
        .container {
            max-width: 800px;
            width: 90%;
            margin: auto auto;
            padding: 40px 20px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.2em;
            margin-bottom: 20px;
            font-weight: normal;
            color: #111;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 razmerje */
            height: 0;
            overflow: hidden;
            max-width: 100%;
            background: #000;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Spodnji pas z zameglitvijo */
        .footer-band {
            width: 100%;
            background-color: rgba(251, 251, 251, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 10;
        }

        /* Noga */
        .footer {
            max-width: 800px;
            width: 90%;
            margin: 0 auto;
            padding: 20px 0 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .footer span {
            color: #111;
            font-size: 0.95em;
            font-weight: bold;
        }

        .footer a {
            color: #1877F2;
            text-decoration: underline;
            font-weight: bold;
            font-size: 0.95em;
        }

        .footer a:hover {
            color: #145dbf;
        }
    </style>
</head>
<body>

    <!-- Zgornji pas -->
    <header class="header-band">
        <nav class="navbar">
            <a class="navbar-brand" href="index.html">Smail Festić</a>
            <div class="navbar-links">
                <a href="index.html">Domov</a>
                <a href="o-meni.html">O meni</a>
                <a href="video.html" style="color: #000; font-weight: bold;">Video</a>
                <a href="umetnine.html">Umetnine</a>
            </div>
        </nav>
    </header>

    <!-- Vsebina -->
    <div class="container">
        <h1>Predstavitveni video</h1>
        <div class="video-wrapper">
            <!-- TUKAJ VSTAVITE SVOJO ORIGINALNO POVEZAVO DO VIDEA -->
            <iframe src="https://www.youtube.com/embed/VAŠ_VIDEO_ID" allowfullscreen></iframe>
        </div>
    </div>

    <!-- Spodnji pas -->
    <footer class="footer-band">
        <div class="footer">
            <span>Kontakt:</span>
            <a href="https://www.facebook.com" target="_blank">Facebook</a>
        </div>
    </footer>

</body>
</html>
