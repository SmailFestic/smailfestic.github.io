<html lang="sl">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smail Festić - Domača stran</title>

        body {
            font-family: 'Georgia', serif;
            line-height: 1.8;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: #fbfbfb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Zgornji meni - popolnoma usklajen po dimenzijah in zaobljenosti */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 400px; /* Enaka širina kot spodnji gumbi */
            width: 85%;       /* Enak odzivni odstotek */
            margin: 40px auto 0 auto; /* Identičen odmik od vrha kot v galeriji */
            padding: 15px 25px;       /* Identična višina */
            background-color: transparent; 
            border: 1px solid rgba(0, 0, 0, 0.1); 
            border-radius: 40px;      /* Enaka zaobljenost */
            box-sizing: border-box;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.1em;
            text-decoration: none;
            color: #111;
        }

        .navbar-links a {
            text-decoration: none;
            color: #555;
            margin-left: 15px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .navbar-links a:hover {
            color: #000;
        }

        /* Osrednji del strani */
        .container {
            max-width: 800px;
            width: 90%;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
            box-sizing: border-box;
            flex-grow: 1; /* Poskrbi, da se vsebina raztegne in potisne noge na dno */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: normal;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .lead-text {
            font-size: 1.05em;
            color: #444;
            max-width: 600px;
            margin: 0 auto;
        }
