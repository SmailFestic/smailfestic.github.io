<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smail Festić - Domača stran</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            line-height: 1.8;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: #fbfbfb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Klasičen meni (identičen kot na o-meni.html) */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            width: 90%;
            margin: 0 auto;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.2em;
            text-decoration: none;
            color: #111;
        }

        .navbar-links a {
            text-decoration: none;
            color: #555;
            margin-left: 20px;
            font-size: 0.95em;
        }

        .navbar-links a:hover {
            color: #000;
        }

        /* Osrednji del strani */
        .container {
            max-width: 800px;
            width: 90%;
            margin: 80px auto 50px auto; /* Povečan zgornji odmik na 80px za več prostora nad sliko */
            padding: 0 20px;
            text-align: center;
            box-sizing: border-box;
            flex-grow: 1;
        }

        /* Oglata slika z zelo nežno zaobljenimi robovi (8px) */
        .profile-img {
            width: 220px; /* Nekoliko večja oglata različica */
            height: auto;
            border-radius: 8px; /* Nežna zaobljenost robov */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: normal;
            color: #111;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .lead-text {
            font-size: 1.05em;
            color: #444;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Noga strani - identična tisti na o-meni.html */
        .footer {
            max-width: 800px;
            width: 90%;
            margin: 0 auto;
            padding: 20px 0 40px 0;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Krepko zapisan kontakt */
        .footer span {
            color: #111;
            font-size: 0.95em;
            font-weight: bold;
        }

        /* Facebook modra povezava s podčrtanjem */
        .footer a {
            color: #1877F2; /* Facebook modra barva */
            text-decoration: underline; /* Vedno podčrtano */
            font-weight: bold;
            font-size: 0.95em;
        }

        .footer a:hover {
            color: #145dbf; /* Malo temnejša modra ob prehodu z miško */
        }
    </style>
</head>
<body>

    <!-- Zgornji meni -->
    <nav class="navbar">
        <a class="navbar-brand" href="index.html">Smail Festić</a>
        <div class="navbar-links">
            <a href="index.html" style="color: #000; font-weight: bold;">Domov</a>
            <a href="o-meni.html">O meni</a>
            <a href="video.html">Video</a>
            <a href="umetnine.html">Umetnine</a>
        </div>
    </nav>

    <!-- Glavna predstavitev s sliko na sredini -->
    <div class="container">
        <img class="profile-img" src="Smail.jpg" alt="Smail Festić">
        <h1>Smail Festić</h1>
        <p class="subtitle">Osebna spletna stran</p>
        <p class="lead-text">
            Pozdravljeni! To je moja osebna spletna stran, ustvarjena s pomočjo GitHub Pages. Tukaj si lahko ogledate pregled mojih del, preberete več o meni ali si ogledate predstavitveni video.
        </p>
    </div>

    <!-- Noga z ravnimi črtami -->
    <footer class="footer">
        <span>Kontakt:</span>
        <a href="https://www.facebook.com" target="_blank">Facebook</a>
    </footer>

</body>
</html>
