<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smail Festić - Domača stran</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: #fbfbfb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Zgornji meni - širina 800px (točno tako kot na umetnine.html) */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            width: 90%;
            margin: 40px auto 0 auto; /* Odmik 40px od vrha */
            padding: 15px 25px;
            background-color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.1em;
            text-decoration: none;
            color: #111;
        }

        .navbar-links a {
            text-decoration: none;
            color: #555;
            margin-left: 20px;
            font-size: 0.9em;
            font-weight: bold;
            transition: color 0.2s ease;
        }

        .navbar-links a:hover {
            color: #000;
        }

        /* Osrednji del strani */
        .container {
            max-width: 600px;
            width: 90%;
            margin: auto; 
            padding: 20px;
            text-align: center;
        }

        /* Okrogla portretna slika na sredini */
        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.2em;
            margin: 0 0 5px 0;
            font-weight: normal;
            color: #111;
        }

        .subtitle {
            color: #666;
            font-size: 1em;
            margin: 0 0 20px 0;
            font-style: italic;
        }

        .lead-text {
            font-size: 0.95em;
            color: #555;
            margin: 0 auto;
            max-width: 500px;
        }

        /* Spodnji kontakt - širina 400px (točno tako kot kontrolna plošča v umetnine.html) */
        .footer-panel {
            max-width: 400px;
            width: 85%;
            margin: 0 auto 40px auto; /* Odmik 40px od spodnjega roba */
            padding: 15px 25px;
            background-color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-panel span {
            color: #555;
            font-size: 0.9em;
            font-weight: bold;
        }

        .footer-panel a {
            color: #111;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9em;
            border-bottom: 1px solid #111;
        }

        .footer-panel a:hover {
            color: #444;
            border-color: #444;
        }
    </style>
</head>
<body>

    <!-- Zgornji meni -->
    <nav class="navbar">
        <a class="navbar-brand" href="index.html">Smail Festić</a>
        <div class="navbar-links">
            <a href="index.html" style="color: #000;">Domov</a>
            <a href="o-meni.html">O meni</a>
            <a href="video.html">Video</a>
            <a href="umetnine.html">Umetnine</a>
        </div>
    </nav>

    <!-- Glavna predstavitev s sliko na sredini -->
    <div class="container">
        <img class="profile-img" src="Smail.jpg" alt="Smail Festić">
        <h1>Smail Festić</h1>
        <p class="subtitle">Osebna spletna stran</p>
        <p class="lead-text">
            Pozdravljeni! To je moja osebna spletna stran, ustvarjena s pomočjo GitHub Pages. Tukaj si lahko ogledate pregled mojih del, preberete več o meni ali si ogledate predstavitveni video.
        </p>
    </div>

    <!-- Spodnja zaobljena kapsula za Kontakt -->
    <div class="footer-panel">
        <span>Kontakt:</span>
        <a href="https://www.facebook.com" target="_blank">Facebook</a>
    </div>

</body>
</html>
