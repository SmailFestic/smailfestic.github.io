<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umetnine - Smail Festić</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            line-height: 1.8;
            margin: 0;
            padding: 0;
            color: #333;
            min-height: 100vh;
            /* Slika čez celoten zaslon v ozadju - čista in ostra */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            transition: background-image 0.8s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Temnejši nežen filter čez celozaslonsko sliko, 
           da so gumbi in meni lažje berljivi, slika pa ostane povsem ostra */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.2); /* Zelo nežen temen pridih (20%) za kontrast */
            z-index: 1;
        }

        /* Navigacijski meni kot elegantna lebdeča ploščica */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            width: 90%;
            margin: 20px auto 0 auto;
            padding: 15px 25px;
            background-color: rgba(255, 255, 255, 0.9); /* Polprosojno belo ozadje */
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            position: relative;
            z-index: 10;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.2em;
            text-decoration: none;
            color: #111;
        }

        .navbar-links a {
            text-decoration: none;
            color: #555;
            margin-left: 20px;
            font-size: 0.95em;
            font-weight: 500;
        }

        .navbar-links a:hover {
            color: #000;
        }

        /* Spodnja lebdeča nadzorna plošča za listanje slik */
        .controls-panel {
            position: relative;
            z-index: 10;
            max-width: 400px;
            width: 85%;
            margin: 0 auto 40px auto;
            background-color: rgba(255, 255, 255, 0.9); /* Polprosojno belo ozadje */
            padding: 15px 25px;
            border-radius: 40px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .control-btn {
            background-color: #222;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-family: inherit;
        }

        .control-btn:hover {
            background-color: #000;
            transform: translateY(-1px);
        }

        .control-btn:active {
            transform: translateY(1px);
        }

        .counter {
            font-size: 0.95em;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a class="navbar-brand" href="index.html">Smail Festić</a>
        <div class="navbar-links">
            <a href="index.html">Domov</a>
            <a href="o-meni.html">O meni</a>
            <a href="video.html">Video</a>
            <a href="umetnine.html" style="color: #000; font-weight: bold;">Umetnine</a>
        </div>
    </nav>

    <div></div>

    <div class="controls-panel">
        <button class="control-btn" onclick="prevImage()">Prejšnja</button>
        <span class="counter" id="counter">1 / 5</span>
        <button class="control-btn" onclick="nextImage()">Naslednja</button>
    </div>

    <script>
        const images = [
            "slika1.jpg",
            "slika2.jpg",
            "slika3.jpg",
            "slika4.jpg",
            "slika5.jpg"
        ];

        let currentIndex = 0;
        const counterElement = document.getElementById("counter");

        function updateBackground() {
            // Nastavi novo sliko v ozadje
            document.body.style.backgroundImage = `url('${images[currentIndex]}')`;
            // Posodobi števec slik
            counterElement.textContent = `${currentIndex + 1} / ${images.length}`;
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            updateBackground();
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateBackground();
        }

        // Listanje s puščicami na tipkovnici
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') {
                nextImage();
            } else if (e.key === 'ArrowLeft') {
                prevImage();
            }
        });

        // Zaženemo začetno sliko takoj ko se stran naloži
        window.onload = updateBackground;
    </script>

</body>
</html>
