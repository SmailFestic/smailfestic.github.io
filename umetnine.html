<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smail Festić - Umetnine</title>
    <style>
        /* Vedno omogočimo drsnik, da meni ne skače levo/desno med zavihki */
        html {
            overflow-y: scroll;
        }

        body {
            font-family: 'Georgia', serif;
            line-height: 1.8;
            margin: 0;
            padding: 0;
            color: #333;
            min-height: 100vh;
            
            /* Slika se predvaja neposredno v ozadju cele strani. */
            /* Dodan je nežen svetel filter (85% bela), da so črke in meni odlično čitljivi, slika pa ostane čista. */
            background-image: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('slika1.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            /* Gladka in mehka tranzicija ob menjavi slik */
            transition: background-image 0.8s ease-in-out;
            
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Klasičen in stabilen meni (enak kot na index.html in o-meni.html) */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            width: 90%;
            margin: 0 auto;
            padding: 20px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 10;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.2em;
            text-decoration: none;
            color: #111;
        }

        .navbar-links a {
            text-decoration: none;
            color: #555;
            margin-left: 20px;
            font-size: 0.95em;
        }

        .navbar-links a:hover {
            color: #000;
        }

        /* Osrednji del strani */
        .container {
            max-width: 800px;
            width: 90%;
            margin: auto auto;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            z-index: 1;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.2em;
            margin-bottom: 5px;
            font-weight: normal;
            color: #111;
        }

        .subtitle {
            color: #444;
            margin-bottom: 40px;
            font-size: 1.05em;
        }

        /* Nadzorna plošča za listanje slik (lebdeča prosojna vrstica) */
        .gallery-controls {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            background-color: rgba(255, 255, 255, 0.9); /* Polprosojno belo ozadje */
            padding: 12px 25px;
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .control-btn {
            background-color: #222;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: inherit;
        }

        .control-btn:hover {
            background-color: #000;
        }

        .counter {
            font-size: 0.95em;
            color: #111;
            font-weight: bold;
            min-width: 60px;
        }

        /* Noga strani (Popolnoma usklajena z index.html in o-meni.html) */
        .footer {
            max-width: 800px;
            width: 90%;
            margin: 0 auto;
            padding: 20px 0 40px 0;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .footer span {
            color: #111;
            font-size: 0.95em;
            font-weight: bold;
        }

        .footer a {
            color: #1877F2;
            text-decoration: underline;
            font-weight: bold;
            font-size: 0.95em;
        }

        .footer a:hover {
            color: #145dbf;
        }
    </style>
</head>
<body>

    <!-- Meni -->
    <nav class="navbar">
        <a class="navbar-brand" href="index.html">Smail Festić</a>
        <div class="navbar-links">
            <a href="index.html">Domov</a>
            <a href="o-meni.html">O meni</a>
            <a href="video.html">Video</a>
            <a href="umetnine.html" style="color: #000; font-weight: bold;">Umetnine</a>
        </div>
    </nav>

    <!-- Vsebina -->
    <div class="container">
        <h1>Umetnine</h1>
        <p class="subtitle">Pregled del in utrinkov iz galerije</p>

        <!-- Kontrolniki spodaj za upravljanje ozadja -->
        <div class="gallery-controls">
            <button class="control-btn" onclick="prevImage()">Prejšnja</button>
            <span class="counter" id="counter">1 / 5</span>
            <button class="control-btn" onclick="nextImage()">Naslednja</button>
        </div>
    </div>

    <!-- Noga -->
    <footer class="footer">
        <span>Kontakt:</span>
        <a href="https://www.facebook.com" target="_blank">Facebook</a>
    </footer>

    <!-- JavaScript za gladko prelivanje celozaslonskih slik v ozadju -->
    <script>
        const images = [
            "slika1.jpg",
            "slika2.jpg",
            "slika3.jpg",
            "slika4.jpg",
            "slika5.jpg"
        ];

        let currentIndex = 0;
        const counterElement = document.getElementById("counter");

        // Funkcija za posodobitev celozaslonskega ozadja s svetlim filtrom vred
        function updateBackground() {
            document.body.style.backgroundImage = `linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.85)), url('${images[currentIndex]}')`;
            counterElement.textContent = `${currentIndex + 1} / ${images.length}`;
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            updateBackground();
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateBackground();
        }

        // Listanje s puščicami na tipkovnici levo/desno
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') {
                nextImage();
            } else if (e.key === 'ArrowLeft') {
                prevImage();
            }
        });

        // Naložimo prvo sliko takoj ob odpiranju strani
        window.onload = updateBackground;
    </script>

</body>
</html>
