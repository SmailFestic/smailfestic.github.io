<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umetnine - Smail Festić</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            line-height: 1.8;
            margin: 0;
            padding: 0;
            background-color: #fbfbfb;
            color: #333;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.2em;
            text-decoration: none;
            color: #333;
        }

        .navbar-links a {
            text-decoration: none;
            color: #666;
            margin-left: 20px;
            font-size: 0.95em;
        }

        .navbar-links a:hover {
            color: #000;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            font-weight: normal;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        /* --- STIL ZA INTERAKTIVNO GALERIJO (KNJIGO) --- */
        .book-gallery {
            position: relative;
            max-width: 600px;
            margin: 30px auto;
            /* Razmerje slike prilagodi glede na potrebe, tu je nastavljeno na lepo pokončno/kvadratno */
            aspect-ratio: 4 / 5; 
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        /* Glavna aktivna slika na sredini */
        .book-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Ohrani originalno razmerje slike znotraj okvirja */
            transition: transform 0.4s ease-in-out, opacity 0.4s ease-in-out;
            background-color: #eaeaea;
        }

        /* Nevidni coni na levi in desni za "listanje" z miško */
        .hover-nav {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 35%;
            z-index: 10;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            background: linear-gradient(to right, rgba(0,0,0,0.1), transparent);
        }

        .hover-nav.right {
            right: 0;
            background: linear-gradient(to left, rgba(0,0,0,0.1), transparent);
        }

        /* Ko greš z miško čez cono, se prikažejo puščice */
        .book-gallery:hover .hover-nav {
            opacity: 1;
        }

        /* Stil puščic */
        .nav-arrow {
            color: white;
            font-size: 2.5em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            font-weight: bold;
        }

        /* Spodnji gumbi za krmiljenje (zelo uporabni za telefone) */
        .gallery-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .control-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: inherit;
        }

        .control-btn:hover {
            background-color: #000;
        }

        .counter {
            font-size: 1em;
            color: #666;
            min-width: 50px;
        }

        /* Prehodni učinek za listanje (knjiga) */
        .slide-left {
            transform: translateX(-100%);
            opacity: 0;
        }

        .slide-right {
            transform: translateX(100%);
            opacity: 0;
        }

        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 40px 0 20px 0;
        }

        a:focus {
            outline: 2px solid #000;
            outline-offset: 3px;
        }
    </style>
</head>
<body>

    <!-- Meni -->
    <nav class="navbar">
        <a class="navbar-brand" href="index.html">Smail Festić</a>
        <div class="navbar-links">
            <a href="index.html">Domov</a>
            <a href="o-meni.html">O meni</a>
            <a href="video.html">Video</a>
            <a href="umetnine.html" style="color: #000; font-weight: bold;">Umetnine</a>
        </div>
    </nav>

    <!-- Vsebina -->
    <div class="container">
        <h1>Umetnine</h1>
        <p class="subtitle">Pregled del in utrinkov iz galerije (povleci miško levo/desno za listanje)</p>
        
        <!-- Galerija v stilu knjige -->
        <div class="book-gallery" id="gallery">
            <!-- Nevidna cona levo za prejšnjo sliko -->
            <div class="hover-nav left" onclick="prevImage()">
                <span class="nav-arrow">&#10094;</span>
            </div>

            <!-- Glavna slika -->
            <img src="slika1.jpg" id="book-img" class="book-image" alt="Umetnina Smail Festić">

            <!-- Nevidna cona desno za naslednjo sliko -->
            <div class="hover-nav right" onclick="nextImage()">
                <span class="nav-arrow">&#10095;</span>
            </div>
        </div>

        <!-- Kontrolniki pod sliko (za lažjo uporabo) -->
        <div class="gallery-controls">
            <button class="control-btn" onclick="prevImage()">Prejšnja</button>
            <span class="counter" id="counter">1 / 5</span>
            <button class="control-btn" onclick="nextImage()">Naslednja</button>
        </div>

        <hr>
        
        <p style="text-align: left;">
            <a href="index.html" style="color: #666; text-decoration: none;">&larr; Nazaj na domov</a>
        </p>
    </div>

    <!-- JavaScript, ki omogoča gladko menjavanje in listanje -->
    <script>
        // Seznam tvojih slik, ki si jih pravkar naložil
        const images = [
            "slika1.jpg",
            "slika2.jpg",
            "slika3.jpg",
            "slika4.jpg",
            "slika5.jpg"
        ];

        let currentIndex = 0;
        const imgElement = document.getElementById("book-img");
        const counterElement = document.getElementById("counter");

        function updateImage(direction) {
            // Dodamo efekt drsenja
            if (direction === 'next') {
                imgElement.style.transform = 'translateX(-20px)';
                imgElement.style.opacity = '0';
            } else {
                imgElement.style.transform = 'translateX(20px)';
                imgElement.style.opacity = '0';
            }

            setTimeout(() => {
                // Posodobimo vir slike in števec
                imgElement.src = images[currentIndex];
                counterElement.textContent = `${currentIndex + 1} / ${images.length}`;
                
                // Vrnemo sliko v prvotni položaj z gladkim prehodom
                imgElement.style.transform = 'translateX(0)';
                imgElement.style.opacity = '1';
            }, 250);
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            updateImage('next');
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            updateImage('prev');
        }

        // Omogoči listanje tudi s puščicami na tipkovnici (levo in desno)
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') {
                nextImage();
            } else if (e.key === 'ArrowLeft') {
                prevImage();
            }
        });
    </script>

</body>
</html>
