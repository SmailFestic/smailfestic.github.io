<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smail Festić - Umetnine</title>
    <style>
        /* Popolna stabilizacija drsnika, da meni ne skače levo/desno */
        html {
            overflow-y: scroll;
        }

        body {
            font-family: 'Georgia', serif;
            line-height: 1.8;
            margin: 0;
            padding: 0;
            color: #333;
            position: relative;
            min-height: 100vh;
            /* Slika v ozadju - čista, ostra in čez celoten zaslon */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            transition: background-image 0.8s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Zelo nežen svetel filter čez ozadje (samo 15% prosojnost brez zameglitve), */
        /* da besedilo in meni ostaneta lepo čitljiva, slike v ozadju pa popolnoma ostre */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(251, 251, 251, 0.15); 
            z-index: -1;
        }

        /* Klasičen in stabilen meni (enak kot na index.html in o-meni.html) */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            width: 90%;
            margin: 0 auto;
            padding: 20px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 10;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.2em;
            text-decoration: none;
            color: #111;
        }

        .navbar-links a {
            text-decoration: none;
            color: #555;
            margin-left: 20px;
            font-size: 0.95em;
        }

        .navbar-links a:hover {
            color: #000;
        }

        /* Osrednji del strani */
        .container {
            max-width: 800px;
            width: 90%;
            margin: auto auto;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            z-index: 1;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.2em;
            margin-bottom: 5px;
            font-weight: normal;
            color: #111;
            text-shadow: 0 1px 4px rgba(255, 255, 255, 0.8); /* Boljša berljivost na slikah */
        }

        .subtitle {
            color: #444;
            margin-bottom: 40px;
            font-size: 1.05em;
            text-shadow: 0 1px 4px rgba(255, 255, 255, 0.8);
        }

        /* Kontrolniki spodaj - lebdeča prosojna vrstica za listanje slik */
        .gallery-controls {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            background-color: rgba(255, 255, 255, 0.9); /* Polprosojno belo ozadje */
            padding: 12px 25px;
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
